<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Arial', sans-serif; color: white; overflow: hidden; }
        .widget { 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #5e17eb; 
            border-radius: 10px; 
            padding: 15px; 
            width: 350px; 
            margin-bottom: 20px; 
            box-shadow: 0 0 15px #5e17eb; 
            transition: all 0.3s ease-in-out;
        }
        h2 { margin: 0 0 10px 0; color: #00ffcc; text-transform: uppercase; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 5px;}
        .note { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 10px; 
            margin-bottom: 8px; 
            border-left: 4px solid #00ffcc; 
            font-size: 14px; 
            line-height: 1.4; 
            border-radius: 0 4px 4px 0;
            animation: fadeIn 0.5s;
        }
        .bet-option { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #222; 
            padding: 10px; 
            margin-bottom: 5px; 
            border-radius: 4px; 
            font-weight: bold;
            animation: fadeIn 0.5s;
            line-height: 1.2;
        }
        .bet-text { flex: 1; padding-right: 15px; font-size: 13px; }
        .odds { color: #ff0055; white-space: nowrap;}
        .bet-question { font-size: 14px; font-weight: bold; color: #ffcc00; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #444; line-height: 1.3;}
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="widget" id="scout-widget">
        <h2 id="coach-name">Coach's Film Room</h2>
        <div id="notes-container"></div>
    </div>
    
    <div class="widget" id="leaderboard-widget" style="display: none;">
        <h2>🏆 TOP HIGH ROLLERS</h2>
        <div id="leaderboard-container"></div>
    </div>

    <div class="widget" id="bet-widget" style="display: none;">
        <h2>🎲 LIVE SPORTSBOOK (!bet)</h2>
        <div id="market-container"></div>
    </div>

    <script>
        async function fetchStreamData() {
            try {
                const response = await fetch('http://localhost:8000/stream_data.json');
                const data = await response.json();

                // 1. UPDATE FILM ROOM WIDGET
                let titleText = data.persona + " Film Room";
                if (data.opponent) titleText += " (vs " + data.opponent + ")";
                document.getElementById('coach-name').innerText = titleText;
                
                const notesDiv = document.getElementById('notes-container');
                const newNotesHTML = data.notes.map(note => `<div class="note">${note}</div>`).join('');
                if (notesDiv.innerHTML !== newNotesHTML) notesDiv.innerHTML = newNotesHTML;
                
                // 2. UPDATE LEADERBOARD WIDGET
                const leaderboardWidget = document.getElementById('leaderboard-widget');
                const leaderboardDiv = document.getElementById('leaderboard-container');
                
                if (data.leaderboard && data.leaderboard.length > 0) {
                    leaderboardWidget.style.display = 'block';
                    let newLeaderboardHTML = "";
                    const medals = ["🥇", "🥈", "🥉", "🏅", "🏅"];
                    
                    data.leaderboard.forEach((player, index) => {
                        newLeaderboardHTML += `
                        <div class="bet-option" style="margin-bottom: 3px; padding: 6px;">
                            <span class="bet-text">${medals[index] || "🏅"} ${player[0]}</span> 
                            <span class="odds" style="color: #00ffcc;">$${player[1]}</span>
                        </div>`;
                    });
                    if (leaderboardDiv.innerHTML !== newLeaderboardHTML) leaderboardDiv.innerHTML = newLeaderboardHTML;
                } else {
                    leaderboardWidget.style.display = 'none';
                }

                // 3. UPDATE SPORTSBOOK WIDGET
                const betWidget = document.getElementById('bet-widget');
                const marketDiv = document.getElementById('market-container');
                
                if (data.market_display && Object.keys(data.market_display.options).length > 0) {
                    betWidget.style.display = 'block'; 
                    let newMarketHTML = `<div class="bet-question">${data.market_display.question}</div>`;
                    for (const [key, details] of Object.entries(data.market_display.options)) {
                        newMarketHTML += `
                        <div class="bet-option">
                            <span class="bet-text">!bet ${key.toLowerCase()} - ${details.text}</span> 
                            <span class="odds">${details.odds}x Payout</span>
                        </div>`;
                    }
                    if (marketDiv.innerHTML !== newMarketHTML) marketDiv.innerHTML = newMarketHTML;
                } else {
                    betWidget.style.display = 'none'; 
                    marketDiv.innerHTML = "";
                }
            } catch (error) { 
                console.error("Waiting for bot data to load..."); 
            }
        }
        // Polls the local server twice a second for instant overlay updates
        setInterval(fetchStreamData, 500);
    </script>
</body>
</html>
